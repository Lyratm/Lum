workflows:
  ios-workflow:
    name: iOS Capacitor Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      ios_signing:
        provisioning_profiles:
          - lum_app_store_profile_final
        certificates:
          - Lum Dist v2
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
    integrations:
      app_store_connect: Lum
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up keychain
        script: keychain initialize
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings
        script: xcode-project use-profiles
      - name: Build ipa
        script: xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-workflow:
    name: Lum Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        - lum_keystore
      vars:
        PACKAGE_NAME: "lum.app"
      node: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Build Android release bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - contact@lum-app.fr